<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Header -->
    <header class="game-header">
        <h1>🎮 Tic Tac Toe</h1>
        <p>Challenge your friends and test your strategy!</p>
    </header>

    <div class="msg-container hide">
        <p id="msg">Winner</p>
    </div>

    <main>
        <div class="container">
            <div class="game">
                <button class="box"></button>
                <button class="box"></button>
                <button class="box"></button>
                <button class="box"></button>
                <button class="box"></button>
                <button class="box"></button>
                <button class="box"></button>
                <button class="box"></button>
                <button class="box"></button>
            </div>
        </div>

        <div class="btn-group">
            <button id="new-game-btn">New Game</button>
            <button id="reset-btn">Reset Game</button>
        </div>
    </main>

    <!-- Footer -->
    <footer class="game-footer">
        <p>Developed with ❤️ by <strong>Rohan Kumar</strong></p>
        <p>© 2026 Tic Tac Toe Game | All Rights Reserved</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
